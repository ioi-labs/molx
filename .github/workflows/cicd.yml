name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  OBSCURA_VERSION: v0.1.10
  OBSCURA_RELEASE_URL: https://github.com/h4ckf0r0day/obscura/releases/download/v0.1.10

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download Go modules
        run: go mod download

      - name: Run tests
        run: go test ./...

  build-binaries:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: molx-linux-amd64
            artifact: dist-linux-amd64
            obscura_asset: obscura-x86_64-linux.tar.gz
          - goos: linux
            goarch: arm64
            archive: molx-linux-arm64
            artifact: dist-linux-arm64
            obscura_asset: obscura-aarch64-linux.tar.gz
          - goos: darwin
            goarch: amd64
            archive: molx-macos-x86_64
            artifact: dist-macos-x86_64
            obscura_asset: obscura-x86_64-macos.tar.gz
          - goos: darwin
            goarch: arm64
            archive: molx-macos-arm64
            artifact: dist-macos-arm64
            obscura_asset: obscura-aarch64-macos.tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download Obscura binaries
        run: |
          mkdir -p "deps/obscura/${{ matrix.goos }}/${{ matrix.goarch }}"
          curl -fsSL -o /tmp/obscura.tar.gz "${OBSCURA_RELEASE_URL}/${{ matrix.obscura_asset }}"
          tar -xzf /tmp/obscura.tar.gz -C "deps/obscura/${{ matrix.goos }}/${{ matrix.goarch }}"
          chmod +x "deps/obscura/${{ matrix.goos }}/${{ matrix.goarch }}/obscura" \
            "deps/obscura/${{ matrix.goos }}/${{ matrix.goarch }}/obscura-worker"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          output="${{ matrix.archive }}"
          mkdir -p "${output}/deps" "${output}/docs"
          CGO_ENABLED=0 go build -ldflags="-s -w" -o "${output}/molx" .
          cp "deps/obscura/${{ matrix.goos }}/${{ matrix.goarch }}/obscura" "${output}/deps/obscura"
          cp "deps/obscura/${{ matrix.goos }}/${{ matrix.goarch }}/obscura-worker" "${output}/deps/obscura-worker"
          cp docs/openapi.yaml "${output}/docs/openapi.yaml"
          cp deps/scalar-standalone.js "${output}/deps/scalar-standalone.js"
          chmod +x "${output}/molx" "${output}/deps/obscura" "${output}/deps/obscura-worker"
          tar -czf "${output}.tar.gz" "${output}"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 1

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}

  build-image:
    needs: build-binaries
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download amd64 dist
        uses: actions/download-artifact@v4
        with:
          name: dist-linux-amd64
          path: dist/linux/amd64

      - name: Download arm64 dist
        uses: actions/download-artifact@v4
        with:
          name: dist-linux-arm64
          path: dist/linux/arm64

      - name: Make binaries executable
        run: |
          chmod +x dist/linux/amd64/molx dist/linux/amd64/deps/obscura dist/linux/amd64/deps/obscura-worker
          chmod +x dist/linux/arm64/molx dist/linux/arm64/deps/obscura dist/linux/arm64/deps/obscura-worker

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-image-pr:
    needs: build-binaries
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download amd64 dist
        uses: actions/download-artifact@v4
        with:
          name: dist-linux-amd64
          path: dist/linux/amd64

      - name: Download arm64 dist
        uses: actions/download-artifact@v4
        with:
          name: dist-linux-arm64
          path: dist/linux/arm64

      - name: Make binaries executable
        run: |
          chmod +x dist/linux/amd64/molx dist/linux/amd64/deps/obscura dist/linux/amd64/deps/obscura-worker
          chmod +x dist/linux/arm64/molx dist/linux/arm64/deps/obscura dist/linux/arm64/deps/obscura-worker

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-arch image (dry-run)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-check
          cache-from: type=gha
