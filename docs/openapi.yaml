openapi: 3.1.0
info:
  title: Molx API
  description: REST API wrapper for the Obscura headless browser CLI.
  version: 1.0.0
tags:
  - name: System
    description: Service health and metadata.
  - name: Fetch
    description: Single-page raw fetch through Obscura.
  - name: Scrape
    description: Single and batch content extraction in Firecrawl-compatible shapes.
  - name: Search
    description: Web search using native search engines.
  - name: Enrich
    description: Structured data extraction via search/scrape and LLM.
servers:
  - url: http://localhost:8080
    description: Local development server
paths:
  /health:
    get:
      summary: Health check
      description: Returns the service status and whether the Obscura binary is available.
      tags: [System]
      security: []
      responses:
        '200':
          description: Service status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /fetch:
    post:
      summary: Fetch a single URL
      description: Runs `obscura fetch` for one URL and returns the rendered content or evaluated result.
      tags: [Fetch]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FetchRequest'
      responses:
        '200':
          description: Fetch result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FetchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
  /scrape:
    post:
      summary: Scrape a single URL
      description: |
        Renders one URL through Obscura and returns extracted content. This is
        the legacy path; `/v2/scrape` uses the same handler and returns the
        Firecrawl v2 response shape.
      tags: [Scrape]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScrapeRequest'
      responses:
        '200':
          description: Scrape result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScrapeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
  /v2/scrape:
    post:
      summary: Scrape a single URL (Firecrawl v2 compatible)
      description: |
        Renders one URL through Obscura and returns extracted content in the
        Firecrawl v2 response shape. Supported formats are markdown, html, text,
        and links. Unsupported fields are accepted but ignored.
      tags: [Scrape]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/V2ScrapeRequest'
      responses:
        '200':
          description: Scraped content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V2ScrapeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
  /v2/batch/scrape:
    post:
      summary: Start a batch scrape job (Firecrawl v2 compatible)
      description: |
        Accepts an array of URLs and starts an asynchronous batch scrape job.
        All valid URLs are processed in parallel with bounded concurrency.
        Poll `GET /v2/batch/scrape/{id}` for status and results.
      tags: [Scrape]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchScrapeRequest'
      responses:
        '200':
          description: Batch scrape job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchScrapeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /search:
    get:
      summary: Search the web via SearXNG
      description: |
        Proxies a query to the configured SearXNG instance using the native
        SearXNG API. Supports query parameters such as `q`, `format`,
        `language`, `time_range`, `safesearch`, and `pageno`.
      tags: [Search]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query.
        - name: format
          in: query
          schema:
            type: string
            enum: [json, html, csv, rss]
          description: Response format.
        - name: language
          in: query
          schema:
            type: string
          description: Language code.
        - name: time_range
          in: query
          schema:
            type: string
            enum: [day, month, year]
          description: Time filter for engines that support it.
        - name: safesearch
          in: query
          schema:
            type: integer
            enum: [0, 1, 2]
          description: Safe search level.
        - name: pageno
          in: query
          schema:
            type: integer
          description: Page number.
      responses:
        '200':
          description: SearXNG response in the requested format.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      summary: Search the web via SearXNG (form endpoint)
      description: |
        Same as GET /search but accepts form-encoded parameters in the request
        body, matching the SearXNG API.
      tags: [Search]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                q:
                  type: string
                format:
                  type: string
                language:
                  type: string
                time_range:
                  type: string
                safesearch:
                  type: integer
                pageno:
                  type: integer
      responses:
        '200':
          description: SearXNG response in the requested format.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v2/search:
    post:
      summary: Search the web (Firecrawl v2 compatible)
      description: |
        Searches the web and returns result titles, URLs, and snippets.
        Include `scrapeOptions` with `formats: ["markdown"]` to scrape each
        result page.
      tags: [Search]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/V2SearchRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V2SearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v2/batch/scrape/{id}:
    get:
      summary: Get batch scrape status
      description: |
        Returns the current status and accumulated results for a batch scrape
        job. Jobs are kept in memory and expire after 24 hours.
      tags: [Scrape]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Batch scrape status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchScrapeStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /enrich:
    post:
      summary: Start an enrichment job
      description: |
        Accepts a prompt and JSON schema. If `urls` is provided, those pages are
        scraped; otherwise the prompt is used to search the web. The content is
        sent to the configured LLM, which returns JSON matching the schema.
        Poll `GET /enrich/{id}` for status and the structured result.
      tags: [Enrich]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrichRequest'
      responses:
        '200':
          description: Enrichment job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrichCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /enrich/{id}:
    get:
      summary: Get enrichment job status
      description: |
        Returns the status and result of an enrichment job. Jobs are kept in
        memory and expire after 24 hours.
      tags: [Enrich]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Enrichment job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrichStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: API key via Authorization Bearer token header.
  schemas:
    FetchRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: Absolute http(s) URL to fetch.
        dump:
          type: string
          enum: [html, text, links, markdown, original, assets, cookies]
          default: html
          description: Output format.
        selector:
          type: string
          description: CSS selector to narrow the output.
        wait:
          type: integer
          description: Post-load settle seconds.
        timeout:
          type: integer
          description: Per-fetch timeout in seconds.
        wait_until:
          type: string
          enum: [domcontentloaded, load, networkidle2, networkidle0]
          default: load
          description: Navigation wait condition.
        eval:
          type: string
          description: JavaScript expression to evaluate in the page context.
        proxy:
          type: string
          description: Proxy URL, e.g. `http://user:pass@proxy:8080`.
        stealth:
          type: boolean
          default: false
          description: Enable stealth mode.
        user_agent:
          type: string
          description: Override User-Agent string.
        storage_dir:
          type: string
          description: Directory to persist cookies and localStorage.
    FetchResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
        url:
          type: string
        title:
          type: string
        result:
          description: Rendered content, evaluated value, or error context.
          oneOf:
            - type: string
            - type: object
            - type: array
        error:
          type: string
        elapsed_ms:
          type: integer
          format: int64
    ScrapeRequest:
      type: object
      required:
        - urls
      properties:
        urls:
          type: array
          items:
            type: string
            format: uri
          description: List of absolute http(s) URLs to scrape.
        eval:
          type: string
          description: JavaScript expression to evaluate on each page.
        concurrency:
          type: integer
          description: Internal Obscura worker concurrency.
        timeout:
          type: integer
          description: Per-URL timeout in seconds.
        format:
          type: string
          enum: [json, tsv]
          default: json
          description: Output format.
        proxy:
          type: string
          description: Proxy URL.
        stealth:
          type: boolean
          default: false
          description: Enable stealth mode.
        user_agent:
          type: string
          description: Override User-Agent string.
    ScrapeResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
        total_urls:
          type: integer
        total_time_ms:
          type: integer
          format: int64
        results:
          type: array
          items:
            type: object
        error:
          type: string
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [ok, "missing binary"]
    V2ScrapeRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: Absolute http(s) URL to scrape. Either `url` or `urls` must be provided; `url` is preferred.
        urls:
          type: array
          items:
            type: string
            format: uri
          description: Array of URLs to scrape. Only the first URL is processed; provided for Firecrawl compatibility.
        formats:
          type: array
          items:
            type: string
            enum: [markdown, html, text, links]
          description: Content formats to return. Default is [markdown].
        onlyMainContent:
          type: boolean
          default: false
          description: Restrict extraction to main/article content.
        onlyCleanContent:
          type: boolean
          default: false
          description: Clean extracted content via an LLM. Requires LLM_BASE_URL, LLM_API_KEY, and LLM_MODEL environment variables.
        includeTags:
          type: array
          items:
            type: string
          description: CSS selectors to include.
        excludeTags:
          type: array
          items:
            type: string
          description: CSS selectors to remove.
        waitFor:
          type: integer
          description: Post-load wait in milliseconds.
        timeout:
          type: integer
          description: Total timeout in milliseconds.
        mobile:
          type: boolean
          default: false
          description: Use a mobile User-Agent.
        proxy:
          type: string
          description: Proxy URL.
        blockAds:
          type: boolean
          default: false
          description: Enable stealth/tracker blocking.
        removeBase64Images:
          type: boolean
          default: false
          description: Strip inline base64 images.
        redactPII:
          type: boolean
          default: false
          description: Basic PII redaction in text/markdown output.
        actions:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [wait, click]
              milliseconds:
                type: integer
              selector:
                type: string
          description: Pre-extraction actions (wait or click).
    V2ScrapeResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/V2ScrapeData'
        error:
          type: string
    V2ScrapeData:
      type: object
      properties:
        markdown:
          type: string
        html:
          type: string
        text:
          type: string
        links:
          type: array
          items:
            type: string
        metadata:
          $ref: '#/components/schemas/V2ScrapeMetadata'
    V2ScrapeMetadata:
      type: object
      properties:
        title:
          type: string
        language:
          type: string
        sourceURL:
          type: string
        url:
          type: string
        statusCode:
          type: integer
        favicon:
          type: string
        viewport:
          type: string
        contentType:
          type: string
    BatchScrapeRequest:
      type: object
      required:
        - urls
      properties:
        urls:
          type: array
          items:
            type: string
            format: uri
          description: URLs to scrape. Only the first URL is processed.
        ignoreInvalidURLs:
          type: boolean
          default: true
          description: Skip invalid URLs instead of failing the whole request.
        maxConcurrency:
          type: integer
          description: Concurrency limit (accepted but not enforced).
        formats:
          type: array
          items:
            type: string
            enum: [markdown, html, text, links]
          default: [markdown]
        onlyMainContent:
          type: boolean
          default: false
        onlyCleanContent:
          type: boolean
          default: false
          description: Clean extracted content via an LLM. Requires LLM_BASE_URL, LLM_API_KEY, and LLM_MODEL environment variables.
        includeTags:
          type: array
          items:
            type: string
        excludeTags:
          type: array
          items:
            type: string
        waitFor:
          type: integer
          description: Post-load wait in milliseconds.
        timeout:
          type: integer
          description: Total timeout in milliseconds.
        mobile:
          type: boolean
          default: false
        proxy:
          type: string
        blockAds:
          type: boolean
          default: false
        actions:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [wait, click]
              milliseconds:
                type: integer
              selector:
                type: string
    BatchScrapeResponse:
      type: object
      required:
        - success
        - id
        - url
      properties:
        success:
          type: boolean
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        invalidURLs:
          type: array
          items:
            type: string
    BatchScrapeStatusResponse:
      type: object
      required:
        - status
        - total
        - completed
        - createdAt
        - expiresAt
        - duration
      properties:
        status:
          type: string
          enum: [scraping, completed, failed]
        total:
          type: integer
        completed:
          type: integer
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
        duration:
          type: number
          format: float
        next:
          type: string
          nullable: true
        data:
          type: array
          items:
            type: object
            properties:
              markdown:
                type: string
              html:
                type: string
                nullable: true
              rawHtml:
                type: string
                nullable: true
              links:
                type: array
                items:
                  type: string
              metadata:
                $ref: '#/components/schemas/V2ScrapeMetadata'
    EnrichRequest:
      type: object
      required:
        - prompt
        - schema
      properties:
        prompt:
          type: string
          description: Instruction describing what structured data to extract.
        schema:
          type: object
          description: JSON Schema describing the desired output shape.
        urls:
          type: array
          items:
            type: string
            format: uri
          description: Optional URLs to scrape. If omitted, the prompt is used to search the web.
    EnrichCreateResponse:
      type: object
      required:
        - success
        - id
        - url
        - status
      properties:
        success:
          type: boolean
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        status:
          type: string
          enum: [pending, running, completed, failed]
    EnrichStatusResponse:
      type: object
      required:
        - id
        - status
        - prompt
        - createdAt
        - expiresAt
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, completed, failed]
        prompt:
          type: string
        schema:
          type: object
          description: JSON Schema from the original request.
        urls:
          type: array
          items:
            type: string
            format: uri
        result:
          type: object
          description: Structured JSON returned by the LLM.
        error:
          type: string
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          default: false
        error:
          type: string
    V2SearchRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: Search query passed to SearXNG.
        limit:
          type: integer
          default: 10
          maximum: 100
          minimum: 1
          description: Maximum number of results to return.
        language:
          type: string
          description: SearXNG language code, e.g. en-US.
        time_range:
          type: string
          enum: [day, month, year]
          description: Time filter for engines that support it.
        safesearch:
          type: integer
          enum: [0, 1, 2]
          default: 0
          description: Safe search level.
        scrapeOptions:
          type: object
          properties:
            formats:
              type: array
              items:
                type: string
                enum: [markdown, html, text, links]
            onlyMainContent:
              type: boolean
              default: false
            onlyCleanContent:
              type: boolean
              default: false
              description: Clean scraped result content via an LLM. Requires LLM_BASE_URL, LLM_API_KEY, and LLM_MODEL environment variables.
            includeTags:
              type: array
              items:
                type: string
            excludeTags:
              type: array
              items:
                type: string
            waitFor:
              type: integer
              description: Post-load wait in milliseconds.
            timeout:
              type: integer
              description: Per-result timeout in milliseconds.
            mobile:
              type: boolean
              default: false
            proxy:
              type: string
              description: Proxy URL.
            blockAds:
              type: boolean
              default: false
    V2SearchResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              url:
                type: string
              description:
                type: string
              markdown:
                type: string
                nullable: true
              html:
                type: string
                nullable: true
              text:
                type: string
                nullable: true
              links:
                type: array
                items:
                  type: string
              metadata:
                $ref: '#/components/schemas/V2ScrapeMetadata'
        error:
          type: string
          nullable: true
  responses:
    BadRequest:
      description: Invalid request body, missing field, or forbidden URL.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Search backend not configured or unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    MethodNotAllowed:
      description: HTTP method not allowed for this endpoint.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
security:
  - bearerAuth: []
